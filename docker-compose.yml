version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./nike-fit-prototype
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./nike-fit-prototype:/app
      - /app/node_modules
    depends_on:
      - backend
